<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 480" role="img" aria-label="hammer — Direction B — The Producer (recommended)">
  <title>hammer — Direction B — The Producer</title>
  <desc>Lowercase wordmark in Outfit Black with a small mono caption "ai producer" beneath, separated by a cinnamon pip.</desc>
  <defs>
    <style type="text/css"><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&amp;family=Geist+Mono:wght@400;500&amp;display=swap');
      .paper { fill:#FAEEE9; }
      .ink   { fill:#1F0707; }
      .cin   { fill:#F28E86; }
      .ink-1 { fill:#3D1413; }
      .ink-2 { fill:#6E2C27; }
      .ink-3 { fill:#A66860; }
      .wm    { font-family:'Outfit','Futura','Avenir Next',system-ui,sans-serif; font-weight:900; letter-spacing:-0.02em; font-kerning:normal; text-rendering:geometricPrecision; font-feature-settings:'kern' 1, 'calt' 1; }
      .cap   { font-family:'Geist Mono','JetBrains Mono',ui-monospace,monospace; font-size:14px; letter-spacing:0.42em; text-transform:lowercase; font-weight:400; }
      .meta  { font-family:'Geist Mono','JetBrains Mono',ui-monospace,monospace; font-size:11px; letter-spacing:0.22em; text-transform:uppercase; font-weight:400; }
      .lab   { font-family:'Geist Mono','JetBrains Mono',ui-monospace,monospace; font-size:10px; letter-spacing:0.22em; text-transform:uppercase; font-weight:400; }
      .badge { font-family:'Geist Mono',ui-monospace,monospace; font-size:10px; letter-spacing:0.22em; text-transform:uppercase; }
    ]]></style>
  </defs>
  <rect class="paper" width="1400" height="480" />
  <line x1="80" y1="64" x2="1320" y2="64" stroke="#1F0707" stroke-width="1" opacity="0.18" />
  <text class="meta ink-2" x="80" y="48">hammer · brand guide</text>
  <rect x="1140" y="34" width="120" height="20" fill="#5A201D" />
  <text class="badge" fill="#FAEEE9" x="1200" y="48" text-anchor="middle">★ recommended</text>
  <text class="meta ink-2" x="1320" y="48" text-anchor="end">B · the producer</text>

  <!-- Main lowercase wordmark -->
  <text class="wm ink" x="700" y="280" font-size="232" text-anchor="middle">h<tspan dx="-1">a</tspan><tspan dx="-10">m</tspan><tspan dx="-7">m</tspan><tspan dx="0">e</tspan><tspan dx="-2">r</tspan><tspan class="cin" dx="2" dy="-10">.</tspan></text>

  <!-- mono caption with cinnamon pip -->
  <text class="cap ink-1" x="640" y="332" text-anchor="end">ai</text>
  <circle class="cin" cx="700" cy="326" r="4" />
  <text class="cap ink-1" x="760" y="332">producer</text>

  <line x1="80" y1="416" x2="1320" y2="416" stroke="#1F0707" stroke-width="1" opacity="0.18" />
  <text class="lab ink-3" x="80" y="448">name + caption · locks ai · producer keyword</text>
  <text class="lab ink-3" x="1320" y="448" text-anchor="end">wordmark · v 3.0</text>
</svg>
