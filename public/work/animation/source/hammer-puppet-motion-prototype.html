<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hammer Puppet Technical Motion Sketch</title>
    <style>
      :root {
        --cream: #faeee9;
        --blush: #f2ddd4;
        --ink: #1f0707;
        --wine: #5a201d;
        --accent: #f28e86;
        --skin: #f2bfa6;
        --paper: #fff8f3;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background: var(--cream);
        color: var(--wine);
        font-family: Menlo, Monaco, Consolas, "Courier New", monospace;
      }

      main {
        display: grid;
        min-height: 100vh;
        grid-template-columns: minmax(300px, 1fr) 360px;
        gap: 28px;
        padding: 32px;
      }

      .stage {
        position: relative;
        overflow: hidden;
        min-height: 620px;
        border: 2px solid #bd665d;
        background: radial-gradient(circle at 45% 56%, #fff8f3 0 18%, transparent 43%), var(--cream);
      }

      .panel {
        display: flex;
        flex-direction: column;
        gap: 18px;
        justify-content: center;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 28px;
        line-height: 1.15;
      }

      h2 {
        font-size: 18px;
      }

      p {
        font-size: 14px;
        line-height: 1.6;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      button {
        min-height: 44px;
        border: 1px solid #bd665d;
        background: var(--paper);
        color: var(--wine);
        cursor: pointer;
        font: inherit;
      }

      button[aria-pressed="true"] {
        background: var(--wine);
        color: var(--cream);
      }

      .contract {
        border: 1px solid #bd665d;
        background: var(--paper);
        padding: 18px;
      }

      svg {
        display: block;
        width: 100%;
        height: 100%;
      }

      .outline {
        fill: none;
        stroke: var(--ink);
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .rig-line {
        fill: none;
        stroke: var(--accent);
        stroke-linecap: round;
        stroke-width: 7;
        stroke-dasharray: 10 14;
      }

      .joint {
        fill: var(--accent);
        stroke: var(--cream);
        stroke-width: 4;
      }

      #puppet {
        transform-box: fill-box;
        transform-origin: center bottom;
        animation: breathe 5.8s ease-in-out infinite;
      }

      #head {
        transform-box: fill-box;
        transform-origin: center 80%;
        animation: headIdle 5.8s ease-in-out infinite;
      }

      #eye_L,
      #eye_R {
        transform-box: fill-box;
        transform-origin: center;
        transition: transform 420ms ease;
      }

      #rig {
        opacity: 0.44;
        transition: opacity 320ms ease;
      }

      #frame_prop {
        opacity: 0;
        transform: translate(80px, 48px) rotate(8deg);
        transform-box: fill-box;
        transform-origin: center;
        transition: opacity 450ms ease, transform 650ms cubic-bezier(.2, .9, .18, 1);
      }

      #arm_R_upper,
      #arm_R_lower,
      #hand_R_present {
        transform-box: fill-box;
        transform-origin: left center;
        transition: transform 650ms cubic-bezier(.2, .9, .18, 1);
      }

      #dot {
        transition: transform 650ms cubic-bezier(.2, .9, .18, 1), opacity 320ms ease;
      }

      #labelText::selection {
        background: transparent;
      }

      [data-mode="wake"] #rig {
        opacity: 1;
        animation: wakeDash 1s linear infinite;
      }

      [data-mode="wake"] #dot {
        transform: translateY(-120px);
      }

      [data-mode="wake"] #eye_L,
      [data-mode="wake"] #eye_R {
        transform: translate(3px, -2px);
      }

      [data-mode="produce"] #frame_prop,
      [data-mode="lockup"] #frame_prop {
        opacity: 1;
        transform: translate(0, 0) rotate(-2deg);
      }

      [data-mode="produce"] #arm_R_upper,
      [data-mode="lockup"] #arm_R_upper {
        transform: rotate(-8deg);
      }

      [data-mode="produce"] #arm_R_lower,
      [data-mode="lockup"] #arm_R_lower {
        transform: rotate(-12deg);
      }

      [data-mode="produce"] #hand_R_present,
      [data-mode="lockup"] #hand_R_present {
        transform: translate(-16px, 18px);
      }

      [data-mode="lockup"] #dot {
        transform: translate(300px, 130px) scale(1.35);
      }

      [data-mode="lockup"] #rig {
        opacity: 0.28;
      }

      @keyframes breathe {
        0%,
        100% {
          transform: translateY(0) scaleY(1);
        }
        50% {
          transform: translateY(-7px) scaleY(1.006);
        }
      }

      @keyframes headIdle {
        0%,
        100% {
          transform: rotate(-1.5deg);
        }
        50% {
          transform: rotate(1.5deg);
        }
      }

      @keyframes wakeDash {
        to {
          stroke-dashoffset: -48;
        }
      }

      @media (max-width: 880px) {
        main {
          grid-template-columns: 1fr;
          padding: 18px;
        }

        .stage {
          min-height: 560px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.001ms !important;
        }
      }
    </style>
  </head>

      <aside class="panel">
        <div>
          <h1>hammer puppet</h1>
          <p>Technical motion sketch only. Final approval needs premium model-sheet art.</p>
        </div>
        <div class="controls" aria-label="Motion states">
          <button type="button" data-set-mode="idle" aria-pressed="true">idle</button>
          <button type="button" data-set-mode="wake" aria-pressed="false">wake</button>
          <button type="button" data-set-mode="produce" aria-pressed="false">produce</button>
          <button type="button" data-set-mode="lockup" aria-pressed="false">lockup</button>
        </div>
        <div class="contract">
          <h2>HammerPuppetVM</h2>
          <p>mode: 0 idle, 1 wake, 2 produce, 3 lockup</p>
          <p>lookX, lookY, expression, mouth, gesture</p>
          <p>hover, focus, reducedMotion</p>
        </div>
      </aside>
    </main>

    <script>
      const modes = ["idle", "wake", "produce", "lockup"];
      let index = 0;
      let timer = null;
      const buttons = Array.from(document.querySelectorAll("[data-set-mode]"));
      const stateText = document.querySelector("#stateText");

      function setMode(mode) {
        document.body.dataset.mode = mode;
        stateText.textContent = `state: ${mode}`;
        buttons.forEach((button) => {
          button.setAttribute("aria-pressed", String(button.dataset.setMode === mode));
        });
        index = modes.indexOf(mode);
      }

      function startLoop() {
        clearInterval(timer);
        timer = setInterval(() => {
          index = (index + 1) % modes.length;
          setMode(modes[index]);
        }, 1800);
      }

      buttons.forEach((button) => {
        button.addEventListener("click", () => {
          clearInterval(timer);
          setMode(button.dataset.setMode);
        });
      });

      startLoop();
    </script>
