<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200" role="img" aria-labelledby="title desc">
  <title id="title">Hammer cartoon puppet technical rig sketch</title>
  <desc id="desc">A technical layer-map sketch for a Hammer producer puppet, not the final premium character approval design.</desc>
  <defs>
    <style>
      :root {
        --cream: #faeee9;
        --blush: #f2ddd4;
        --ink: #1f0707;
        --wine: #5a201d;
        --accent: #f28e86;
        --skin: #f2bfa6;
        --paper: #fff8f3;
        --sage: #56665d;
      }

      text {
        fill: var(--wine);
        font-family: Courier, monospace;
        letter-spacing: 0;
      }

      .label {
        font-size: 20px;
      }

      .micro {
        font-size: 13px;
      }

      .section {
        font-size: 28px;
        font-weight: 700;
      }

      .outline {
        fill: none;
        stroke: var(--ink);
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .rig-line {
        fill: none;
        stroke: var(--accent);
        stroke-linecap: round;
        stroke-width: 6;
        stroke-dasharray: 10 13;
      }

      .joint {
        fill: var(--accent);
        stroke: var(--cream);
        stroke-width: 4;
      }
    </style>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#5a201d" flood-opacity=".18"/>
    </filter>
  </defs>

