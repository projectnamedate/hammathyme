<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200" role="img" aria-labelledby="title desc">
  <title id="title">Hammer cartoon producer character sheet</title>
  <desc id="desc">A warm cream character sheet for a 2D cartoon producer puppet with expressions, mouth shapes, hand poses, and a shot-board prop.</desc>
  <defs>
    <style>
      .bg{fill:#faeee9}
      .panel{fill:#f2ddd4;stroke:#a66860;stroke-width:2}
      .ink{fill:#1f0707}
      .line{fill:none;stroke:#1f0707;stroke-width:8;stroke-linecap:round;stroke-linejoin:round}
      .thin{fill:none;stroke:#1f0707;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .muted{fill:#6e2c27}
      .accent{fill:#f28e86}
      .accent-line{fill:none;stroke:#f28e86;stroke-width:7;stroke-linecap:round;stroke-linejoin:round}
      .cream{fill:#faeee9}
      .jacket{fill:#5a201d}
      .skin{fill:#f2c2ae}
      .label{font-family:Menlo,monospace;font-size:24px;letter-spacing:.08em;fill:#6e2c27}
      .small{font-family:Menlo,monospace;font-size:18px;letter-spacing:.08em;fill:#6e2c27}
    </style>
    <g id="head-neutral">
      <path class="skin" d="M0-92 C70-92 104-42 96 24 C88 90 36 118-24 106 C-82 94-112 48-102-16 C-92-74-58-92 0-92Z"/>
      <path class="ink" d="M-78-48 C-54-112 32-122 72-66 C30-78-22-72-78-48Z"/>
      <path class="line" d="M0-92 C70-92 104-42 96 24 C88 90 36 118-24 106 C-82 94-112 48-102-16 C-92-74-58-92 0-92Z"/>
      <path class="thin" d="M-54-16 Q-28-28-2-16"/>
      <path class="thin" d="M32-14 Q54-26 76-14"/>
      <circle class="ink" cx="-28" cy="8" r="7"/>
      <circle class="ink" cx="54" cy="8" r="7"/>
      <path class="thin" d="M-12 52 Q16 66 48 50"/>
    </g>
    <g id="body-front">
      <path class="skin" d="M-36 104 L36 104 L28 164 L-28 164Z"/>
      <path class="jacket" d="M-92 162 C-68 126 68 126 92 162 L128 342 L-128 342Z"/>
      <path class="cream" d="M-36 154 L0 252 L36 154Z"/>
      <path class="line" d="M-92 162 C-68 126 68 126 92 162 L128 342 L-128 342Z"/>
      <path class="thin" d="M-36 154 L0 252 L36 154"/>
      <circle class="accent" cx="0" cy="288" r="10"/>
    </g>
    <g id="legs-front">
      <path class="line" d="M-54 342 L-62 482"/>
      <path class="line" d="M54 342 L64 482"/>
      <path class="ink" d="M-98 506 C-76 474-28 478-20 512 L-98 512Z"/>
      <path class="ink" d="M24 512 C32 478 82 474 104 506 L24 512Z"/>
    </g>
    <g id="arms-rest">
      <path class="line" d="M-116 188 L-174 288 L-142 342"/>
      <path class="line" d="M116 188 L174 288 L142 342"/>
      <circle class="skin" cx="-140" cy="350" r="30"/>
      <circle class="skin" cx="140" cy="350" r="30"/>
      <circle class="accent" cx="-116" cy="188" r="12"/>
      <circle class="accent" cx="116" cy="188" r="12"/>
    </g>
    <g id="character-front">
      <use href="#body-front"/>
      <use href="#legs-front"/>
      <use href="#arms-rest"/>
      <use href="#head-neutral"/>
    </g>
  </defs>

  <rect class="bg" width="1800" height="1200"/>
  <rect x="40" y="40" width="1720" height="1120" rx="0" class="panel"/>
  <text x="80" y="105" class="label">hammer cartoon puppet reference</text>
  <text x="80" y="145" class="small">vector-first character sheet for rive rigging</text>

  <g transform="translate(330 230)">
    <text x="-160" y="-70" class="small">front neutral</text>
    <use href="#character-front" transform="scale(1.25)"/>
  </g>

  <g transform="translate(780 230)">
    <text x="-150" y="-70" class="small">three-quarter</text>
    <use href="#body-front" transform="scale(.98) skewY(-3)"/>
    <use href="#legs-front" transform="scale(.98)"/>
    <path class="line" d="M-104 188 L-160 248 L-212 210"/>
    <path class="line" d="M118 188 L202 234 L238 184"/>
    <circle class="skin" cx="-220" cy="206" r="28"/>
    <circle class="skin" cx="244" cy="180" r="28"/>
    <use href="#head-neutral" transform="translate(18 0) scale(1.02)"/>
    <circle class="accent" cx="-104" cy="188" r="12"/>
    <circle class="accent" cx="118" cy="188" r="12"/>
  </g>

  <g transform="translate(1260 200)">
    <text x="-150" y="-40" class="small">expressions</text>
    <g transform="translate(-190 60) scale(.58)">
      <use href="#head-neutral"/>
      <text x="-74" y="160" class="small">neutral</text>
    </g>
    <g transform="translate(10 60) scale(.58)">
      <use href="#head-neutral"/>
      <path class="thin" d="M-58-24 L2-8"/>
      <path class="thin" d="M28-8 L84-26"/>
      <text x="-70" y="160" class="small">focused</text>
    </g>
    <g transform="translate(210 60) scale(.58)">
      <use href="#head-neutral"/>
      <circle class="cream" cx="-28" cy="8" r="18"/>
      <circle class="cream" cx="54" cy="8" r="18"/>
      <circle class="ink" cx="-28" cy="8" r="7"/>
      <circle class="ink" cx="54" cy="8" r="7"/>
      <ellipse class="ink" cx="18" cy="58" rx="18" ry="24"/>
      <text x="-78" y="160" class="small">surprised</text>
    </g>
    <g transform="translate(410 60) scale(.58)">
      <use href="#head-neutral"/>
      <path class="thin" d="M-20 46 Q18 88 60 44"/>
      <text x="-64" y="160" class="small">pleased</text>
    </g>
  </g>

  <g transform="translate(105 780)">
    <text x="0" y="-90" class="small">mouth shapes</text>
    <g transform="translate(40 0)">
      <path class="thin" d="M0 0 Q28 8 58 0"/>
      <text x="-20" y="58" class="small">closed</text>
    </g>
    <g transform="translate(190 0)">
      <ellipse class="ink" cx="28" cy="2" rx="24" ry="12"/>
      <text x="-8" y="58" class="small">small</text>
    </g>
    <g transform="translate(330 0)">
      <ellipse class="ink" cx="28" cy="0" rx="28" ry="38"/>
      <text x="-6" y="58" class="small">open</text>
    </g>
    <g transform="translate(470 0)">
      <path class="thin" d="M0-8 Q28 38 64-8"/>
      <text x="-2" y="58" class="small">smile</text>
    </g>
  </g>

  <g transform="translate(780 770)">
    <text x="-20" y="-80" class="small">hand poses</text>
    <g transform="translate(0 0)">
      <circle class="skin" cx="0" cy="0" r="34"/>
      <path class="thin" d="M-12-18 L-22-50 M4-22 L4-56 M20-16 L30-48"/>
      <text x="-36" y="62" class="small">rest</text>
    </g>
    <g transform="translate(150 0)">
      <circle class="skin" cx="0" cy="0" r="28"/>
      <path class="line" d="M12-10 L84-48"/>
      <text x="-42" y="62" class="small">point</text>
    </g>
    <g transform="translate(330 0)">
      <circle class="skin" cx="0" cy="0" r="28"/>
      <path class="line" d="M24 0 L96 0"/>
      <rect x="92" y="-44" width="92" height="70" class="panel"/>
      <circle class="accent" cx="138" cy="-10" r="8"/>
      <text x="-58" y="62" class="small">present</text>
    </g>
    <g transform="translate(560 0)">
      <circle class="skin" cx="0" cy="0" r="28"/>
      <path class="line" d="M-8-12 L-38-76 M8-14 L8-84 M22-4 L52-72"/>
      <text x="-38" y="62" class="small">wave</text>
    </g>
  </g>

  <g transform="translate(1310 760)">
    <text x="-10" y="-70" class="small">shot-board prop</text>
    <rect x="0" y="0" width="280" height="180" class="panel"/>
    <path class="thin" d="M26 42 H254 M26 90 H206 M26 138 H166"/>
    <circle class="accent" cx="238" cy="138" r="20"/>
  </g>

  <g transform="translate(80 1118)">
    <text class="small">palette #FAEEE9 #F2DDD4 #1F0707 #5A201D #F28E86 · rebuild as separated rive vector layers before rigging</text>
  </g>
</svg>
